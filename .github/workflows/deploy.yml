name: Deploy to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd /var/www/netprime

            sudo -u www-data git fetch --all
            sudo -u www-data git reset --hard origin/main

            sudo -u www-data composer install --no-dev --optimize-autoloader

            sudo -u www-data php artisan migrate --force

            sudo -u www-data php artisan config:cache || true
            sudo -u www-data php artisan route:cache || true

            sudo -u www-data php artisan storage:link || true

            sudo systemctl restart netprime-queue || true
            sudo systemctl reload nginx || true